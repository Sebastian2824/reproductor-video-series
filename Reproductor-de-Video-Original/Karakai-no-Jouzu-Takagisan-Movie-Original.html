<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reproductor de Película / Episodio Único</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       RESET Y BASE
    ============================================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: 'Poppins', sans-serif;
      background: url(https://static.wixstatic.com/media/8a7da0_da693a5c2b2d42bbb084707197421b0a~mv2.png) center/cover no-repeat fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #0a2a44;
      position: relative;
    }

    /* Overlay suave */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(4px);
      z-index: 0;
    }

    /* ============================================================
       CONTENEDOR PRINCIPAL — glassmorphism
    ============================================================ */
    .container {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.60);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-radius: 32px;
      box-shadow: 0 20px 40px -12px rgba(0, 20, 40, 0.30), inset 0 1px 0 rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.4);
      padding: 24px 28px;
      max-width: 900px;
      width: 94%;
      transition: all 0.3s ease;
    }

    /* ============================================================
       BARRA SUPERIOR (selectores)
    ============================================================ */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
    }

    .top-bar select {
      padding: 10px 16px;
      padding-right: 36px;
      border-radius: 40px;
      border: 1px solid rgba(0,0,0,0.06);
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(4px);
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      color: #0a2a44;
      appearance: none;
      -webkit-appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="12" height="8" viewBox="0 0 12 8"><path fill="%230d47a1" d="M6 8L0 0h12z"/></svg>');
      background-repeat: no-repeat;
      background-position: right 14px center;
      background-size: 12px 8px;
      cursor: pointer;
      transition: all 0.25s ease;
      min-width: 140px;
      flex: 1 1 auto;
    }

    .top-bar select:focus {
      outline: none;
      border-color: #0d47a1;
      box-shadow: 0 0 0 4px rgba(13, 71, 161, 0.10);
    }

    .top-bar select:hover {
      background-color: rgba(255, 255, 255, 0.8);
      border-color: #0d47a1;
    }

    .top-bar select option {
      background: #fff;
      color: #0a2a44;
    }

    /* Indicador de servicio (badge) */
    .service-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 6px 16px 6px 12px;
      border-radius: 40px;
      background: rgba(13, 71, 161, 0.08);
      color: #0d47a1;
      border: 1px solid rgba(13, 71, 161, 0.12);
      backdrop-filter: blur(4px);
      white-space: nowrap;
    }

    .service-indicator i {
      font-size: 0.85rem;
      color: #0288d1;
    }

    /* ============================================================
       REPRODUCTOR DE VIDEO
    ============================================================ */
    .video-container {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      background: #000;
      position: relative;
    }

    .video-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 768px) {
      .container {
        padding: 18px 16px;
        border-radius: 24px;
        width: 98%;
      }

      .top-bar {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }

      .top-bar select {
        width: 100%;
        min-width: unset;
      }

      .service-indicator {
        align-self: center;
        font-size: 0.7rem;
        padding: 4px 14px 4px 10px;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 14px 12px;
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- Barra superior con selectores de servidor y servicio -->
  <div class="top-bar">
    <select class="server-selector" id="serverSelector" onchange="changeServer(this.value)"></select>
    <select class="service-selector" id="serviceSelector" onchange="cambiarServicio(this.value)">
      <option value="firebase">Firebase</option>
      <option value="cloudflare">Cloudflare</option>
      <option value="sheets">Google Sheets</option>
    </select>
    <span class="service-indicator" id="serviceIndicator">
      <i class="fas fa-database"></i> Servicio: Firebase
    </span>
  </div>

  <div class="video-container" id="videoContainer"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
<script>
  // ================= CONFIGURACIÓN =================
  const firebaseConfig = {
    apiKey: "AIzaSyB6MY2y5uyum87PdUHUpY8NNh4D73Yhx4U",
    authDomain: "animes-plus-89b93.firebaseapp.com",
    projectId: "animes-plus-89b93",
    storageBucket: "animes-plus-89b93.appspot.com",
    messagingSenderId: "402867181985",
    appId: "1:402867181985:web:d695b12977fe4270dbd3e0",
    measurementId: "G-DN632G7XJT"
  };

  const CLOUDFLARE_BASE_URL = "https://proyecto-cloudflare.apiprueba2025.workers.dev";

  const GOOGLE_SHEETS_CONFIG = {
    SPREADSHEET_ID: '1V4LTYiuTDZ_Y_k6GRyVmFm5-G3rVhE6x1KfIcxJfLqM',
    HOJA_IFRAMES: 'iframes'
  };

  // Datos fijos de la serie / película
  const nombreSerie = "Karakai no Jouzu Takagisan";
  const temporada = "Movie 01";
  const idioma = "Sub Español";
  const nombreEpisodio = "Episodio 01"; // Puedes cambiarlo si tu episodio se llama diferente

  // ================= INICIALIZACIÓN =================
  const app = firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let servidores = {};          // { servidor: iframe }
  let servidorActivo = null;
  let servicioActivo = 'firebase'; // 'firebase', 'cloudflare', 'sheets'

  // ================= FUNCIONES DE CARGA =================

  async function cargarDatos() {
    mostrarMensajeCarga();

    try {
      if (servicioActivo === 'firebase') {
        await cargarDesdeFirebase();
      } else if (servicioActivo === 'cloudflare') {
        await cargarDesdeCloudflare();
      } else {
        await cargarDesdeGoogleSheets();
      }
      // Si todo ok, actualizar interfaz
      actualizarUI();
    } catch (error) {
      console.error(`Error en ${servicioActivo}:`, error);
      // Fallback al siguiente servicio
      const servicios = ['firebase', 'cloudflare', 'sheets'];
      const idx = servicios.indexOf(servicioActivo);
      const next = servicios[(idx + 1) % servicios.length];
      servicioActivo = next;
      document.getElementById('serviceSelector').value = next;
      actualizarIndicador();
      await cargarDatos(); // reintentar
    }
  }

  function mostrarMensajeCarga() {
    const container = document.getElementById('videoContainer');
    container.innerHTML = `
      <div style="padding: 40px; text-align: center; background: rgba(255,255,255,0.3); backdrop-filter: blur(4px); border-radius: 16px; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <div style="margin-bottom:15px; font-size: 2.5rem;">⏳</div>
        <h3 style="color: #0a2a44;">Cargando video desde ${servicioActivo.toUpperCase()}...</h3>
        <p style="color: #1e3a5f;">${nombreSerie} - ${temporada} (${idioma})</p>
      </div>
    `;
  }

  // ------- Firebase -------
  async function cargarDesdeFirebase() {
    const servidoresSnap = await db
      .collection("animes-series").doc(nombreSerie)
      .collection("Temporadas").doc(temporada)
      .collection("Idiomas").doc(idioma)
      .collection("Servidores").get();

    servidores = {};

    for (const servidorDoc of servidoresSnap.docs) {
      const servidor = servidorDoc.id;
      const epDoc = await db
        .collection("animes-series").doc(nombreSerie)
        .collection("Temporadas").doc(temporada)
        .collection("Idiomas").doc(idioma)
        .collection("Servidores").doc(servidor)
        .collection("Episodios")
        .doc(nombreEpisodio)
        .get();

      if (epDoc.exists) {
        servidores[servidor] = epDoc.data().iframe;
      }
    }

    if (Object.keys(servidores).length === 0) {
      throw new Error(`No se encontró el episodio "${nombreEpisodio}" en Firebase`);
    }

    servidorActivo = Object.keys(servidores)[0];
  }

  // ------- Cloudflare -------
  async function cargarDesdeCloudflare() {
    const resServ = await fetch(`${CLOUDFLARE_BASE_URL}/servidores?serie=${encodeURIComponent(nombreSerie)}&temporada=${encodeURIComponent(temporada)}&idioma=${encodeURIComponent(idioma)}`);
    if (!resServ.ok) throw new Error("Error obteniendo servidores desde Cloudflare");
    const servidoresList = await resServ.json();
    if (!servidoresList || servidoresList.error) throw new Error(servidoresList.error || "No hay servidores");

    servidores = {};

    for (const servidor of servidoresList) {
      const resEps = await fetch(`${CLOUDFLARE_BASE_URL}/episodios?serie=${encodeURIComponent(nombreSerie)}&temporada=${encodeURIComponent(temporada)}&idioma=${encodeURIComponent(idioma)}&servidor=${encodeURIComponent(servidor)}`);
      if (!resEps.ok) continue;
      const epsData = await resEps.json();
      if (!epsData || epsData.error) continue;

      // Buscar el episodio específico
      const epData = epsData.find(e => e.episodio === nombreEpisodio);
      if (epData) {
        servidores[servidor] = epData.iframe;
      }
    }

    if (Object.keys(servidores).length === 0) {
      throw new Error(`No se encontró el episodio "${nombreEpisodio}" en Cloudflare`);
    }

    servidorActivo = Object.keys(servidores)[0];
  }

  // ------- Google Sheets -------
  async function cargarDesdeGoogleSheets() {
    const csvUrl = `https://docs.google.com/spreadsheets/d/${GOOGLE_SHEETS_CONFIG.SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(GOOGLE_SHEETS_CONFIG.HOJA_IFRAMES)}`;
    const resp = await fetch(csvUrl);
    if (!resp.ok) throw new Error("Error obteniendo CSV de Google Sheets");
    const csvText = await resp.text();
    const rows = parseCSV(csvText);
    if (rows.length < 2) throw new Error("CSV vacío o mal formado");

    servidores = {};

    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      const serieCSV = (row[0] || '').trim();
      const tempCSV = (row[1] || '').trim();
      const idiomaCSV = (row[2] || '').trim();
      const servidorCSV = (row[3] || '').trim();
      const epCSV = (row[4] || '').trim();
      const iframeCSV = (row[5] || '').trim();

      if (serieCSV !== nombreSerie || tempCSV !== temporada || idiomaCSV !== idioma) continue;
      if (epCSV !== nombreEpisodio) continue;
      if (!iframeCSV || !servidorCSV) continue;

      servidores[servidorCSV] = iframeCSV;
    }

    if (Object.keys(servidores).length === 0) {
      throw new Error(`No se encontró el episodio "${nombreEpisodio}" en Google Sheets`);
    }

    servidorActivo = Object.keys(servidores)[0];
  }

  // Utilidad: parsear CSV
  function parseCSV(text) {
    const rows = [];
    const lines = text.split('\n');
    for (const line of lines) {
      if (!line.trim()) continue;
      const row = [];
      let current = '';
      let inside = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') inside = !inside;
        else if (ch === ',' && !inside) {
          row.push(current.trim());
          current = '';
        } else {
          current += ch;
        }
      }
      row.push(current.trim());
      rows.push(row.map(c => c.replace(/^"|"$/g, '')));
    }
    return rows;
  }

  // ================= ACTUALIZACIÓN DE UI =================

  function actualizarUI() {
    // Selector de servidores
    const serverSel = document.getElementById('serverSelector');
    serverSel.innerHTML = '';
    for (const servidor in servidores) {
      const opt = document.createElement('option');
      opt.value = servidor;
      opt.textContent = servidor;
      if (servidor === servidorActivo) opt.selected = true;
      serverSel.appendChild(opt);
    }

    // Cargar el primer servidor
    changeServer(servidorActivo);
    actualizarIndicador();
  }

  function actualizarIndicador() {
    const label = document.getElementById('serviceIndicator');
    const nombres = { firebase: 'Firebase', cloudflare: 'Cloudflare', sheets: 'Google Sheets' };
    const iconos = { firebase: 'fa-database', cloudflare: 'fa-cloud', sheets: 'fa-table' };
    const servicio = servicioActivo || 'firebase';
    label.innerHTML = `<i class="fas ${iconos[servicio]}"></i> Servicio: ${nombres[servicio] || servicio}`;
  }

  // ================= FUNCIONES DE CONTROL =================

  function cambiarServicio(nuevo) {
    if (nuevo === servicioActivo) return;
    servicioActivo = nuevo;
    document.getElementById('serviceSelector').value = nuevo;
    actualizarIndicador();
    cargarDatos();
  }

  function changeServer(servidor) {
    servidorActivo = servidor;
    const container = document.getElementById('videoContainer');
    const iframeHTML = servidores[servidor];

    if (!iframeHTML) {
      container.innerHTML = `
        <div style="padding:20px; background:rgba(255,238,238,0.8); backdrop-filter:blur(4px); color:#a94442; border-radius:10px; text-align:center; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center;">
          <p style="font-weight:600;">No hay iframe disponible para el servidor <strong>${servidor}</strong>.</p>
          <button onclick="cambiarServicio(document.getElementById('serviceSelector').value)" 
                  style="margin-top:10px; padding:10px 20px; background:#0d47a1; color:white; border:none; border-radius:40px; cursor:pointer; font-weight:600; transition:0.2s;">
            Cambiar servicio
          </button>
        </div>
      `;
      return;
    }

    container.innerHTML = iframeHTML;
    document.getElementById('serverSelector').value = servidor;
  }

  // ================= INICIO =================
  cargarDatos();
</script>
</body>
</html>
