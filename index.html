<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión</title>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       RESET Y BASE
    ============================================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(145deg, #e1f0ff 0%, #b6d4fe 40%, #7bb3f0 100%);
      padding: 20px;
      position: relative;
    }

    /* Overlay decorativo */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ============================================================
       CONTENEDOR PRINCIPAL — glassmorphism
    ============================================================ */
    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      background: rgba(255, 255, 255, 0.60);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 32px;
      box-shadow: 0 20px 40px -12px rgba(0, 20, 40, 0.30), inset 0 1px 0 rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.4);
      overflow: hidden;
      margin: 20px;
      transition: all 0.3s ease;
    }

    /* ============================================================
       HEADER
    ============================================================ */
    .login-header {
      background: linear-gradient(135deg, #0d47a1, #0288d1);
      color: #fff;
      text-align: center;
      padding: 32px 20px 28px;
      position: relative;
      overflow: hidden;
    }

    .login-header::after {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 200px;
      height: 200px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
      pointer-events: none;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      border: 2px solid rgba(255,255,255,0.2);
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
    }

    .logo i {
      color: #fff;
      font-size: 38px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.10);
    }

    .login-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .login-header p {
      opacity: 0.85;
      font-size: 0.95rem;
      font-weight: 400;
    }

    /* ============================================================
       BODY DEL FORMULARIO
    ============================================================ */
    .login-body {
      padding: 32px 28px 28px;
    }

    .input-group {
      margin-bottom: 22px;
      position: relative;
    }

    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 0.85rem;
      color: #0a2a44;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 40px;
      font-size: 0.95rem;
      font-family: 'Poppins', sans-serif;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(4px);
      transition: all 0.25s ease;
      color: #0a2a44;
    }

    .input-group input:focus {
      outline: none;
      border-color: #0d47a1;
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 0 0 4px rgba(13, 71, 161, 0.08);
    }

    .input-group input::placeholder {
      color: #1e3a5f;
      opacity: 0.5;
    }

    .input-group i {
      position: absolute;
      left: 16px;
      bottom: 16px;
      color: #0288d1;
      font-size: 1.1rem;
      opacity: 0.6;
      transition: opacity 0.3s;
    }

    .input-group input:focus + i,
    .input-group input:focus ~ i {
      opacity: 1;
    }

    /* ============================================================
       RECORDAR / OLVIDASTE
    ============================================================ */
    .remember-forgot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      font-size: 0.85rem;
      flex-wrap: wrap;
      gap: 8px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .remember-me input[type="checkbox"] {
      accent-color: #0d47a1;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .remember-me label {
      color: #0a2a44;
      font-weight: 500;
      cursor: pointer;
    }

    .forgot-password a {
      color: #0d47a1;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .forgot-password a:hover {
      color: #0288d1;
      text-decoration: underline;
    }

    /* ============================================================
       BOTÓN DE INICIO DE SESIÓN
    ============================================================ */
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #0d47a1, #0288d1);
      color: #fff;
      border: none;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgba(2, 136, 209, 0.30);
      font-family: 'Poppins', sans-serif;
      letter-spacing: 0.5px;
      margin-bottom: 20px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(13, 71, 161, 0.35);
      background: linear-gradient(135deg, #0a2a44, #0d47a1);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    /* ============================================================
       REGISTRO
    ============================================================ */
    .register-link {
      text-align: center;
      font-size: 0.9rem;
      color: #1e3a5f;
    }

    .register-link a {
      color: #0d47a1;
      font-weight: 600;
      text-decoration: none;
      transition: color 0.2s;
    }

    .register-link a:hover {
      color: #0288d1;
      text-decoration: underline;
    }

    /* ============================================================
       VENTANA FLOTANTE DE RECUPERACIÓN — glassmorphism
    ============================================================ */
    #ventana-recuperacion {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(6px);
      justify-content: center;
      align-items: center;
      z-index: 9999;
      padding: 20px;
    }

    #ventana-recuperacion > div {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 32px;
      padding: 32px 28px;
      max-width: 420px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.4);
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.25);
    }

    #ventana-recuperacion h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #0a2a44;
      margin-bottom: 20px;
      text-align: center;
    }

    #ventana-recuperacion input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 40px;
      font-size: 0.9rem;
      font-family: 'Poppins', sans-serif;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(4px);
      transition: all 0.25s ease;
      margin-bottom: 12px;
      color: #0a2a44;
    }

    #ventana-recuperacion input:focus {
      outline: none;
      border-color: #0d47a1;
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 0 0 4px rgba(13, 71, 161, 0.08);
    }

    #ventana-recuperacion input::placeholder {
      color: #1e3a5f;
      opacity: 0.5;
    }

    #btn-actualizar-password {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #0d47a1, #0288d1);
      color: #fff;
      border: none;
      border-radius: 40px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgba(2, 136, 209, 0.25);
      font-family: 'Poppins', sans-serif;
      margin-top: 4px;
    }

    #btn-actualizar-password:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(13, 71, 161, 0.30);
      background: linear-gradient(135deg, #0a2a44, #0d47a1);
    }

    #ventana-recuperacion .cancel-btn {
      display: block;
      margin: 12px auto 0;
      padding: 8px 20px;
      background: transparent;
      border: none;
      color: #1e3a5f;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: color 0.2s;
      font-family: 'Poppins', sans-serif;
    }

    #ventana-recuperacion .cancel-btn:hover {
      color: #0d47a1;
      text-decoration: underline;
    }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 480px) {
      .login-container {
        max-width: 100%;
        margin: 12px;
        border-radius: 28px;
      }
      
      .login-header {
        padding: 24px 16px 20px;
      }
      
      .login-header h1 {
        font-size: 1.5rem;
      }
      
      .login-body {
        padding: 24px 18px 20px;
      }
      
      .input-group input {
        padding: 12px 14px 12px 38px;
        font-size: 0.9rem;
      }
      
      .input-group i {
        left: 14px;
        bottom: 14px;
        font-size: 1rem;
      }
      
      #ventana-recuperacion > div {
        padding: 24px 18px;
      }
    }

    @media (max-width: 380px) {
      .remember-forgot {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="logo">
        <i class="fas fa-film"></i>
      </div>
      <h1>Bienvenido</h1>
      <p>Inicia sesión en tu cuenta</p>
    </div>
    
    <div class="login-body">
      <form>
        <div class="input-group">
          <label for="correo">Correo</label>
          <input type="text" id="correo" placeholder="Ingresa tu correo electrónico">
          <i class="fas fa-user"></i>
        </div>
        
        <div class="input-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="Ingresa tu contraseña">
          <i class="fas fa-lock"></i>
        </div>
        
        <div class="remember-forgot">
          <div class="forgot-password">
            <a href="#">¿Olvidaste tu contraseña?</a>
          </div>
        </div>
        
        <button type="button" class="login-btn">Iniciar Sesión</button>
        
      </form>
    </div>
  </div>

  <!-- Ventana flotante de recuperación -->
  <div id="ventana-recuperacion">
    <div>
      <h2>Recuperar Contraseña</h2>
      <input id="recuperar-correo" type="text" placeholder="Correo electrónico">
      <input id="recuperar-fecha" type="text" placeholder="Fecha de nacimiento (DD/MM/AAAA)">
      <input id="nueva-password" type="password" placeholder="Nueva contraseña">
      <button id="btn-actualizar-password">Actualizar Contraseña</button>
      <button class="cancel-btn" onclick="document.getElementById('ventana-recuperacion').style.display = 'none'">Cancelar</button>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/Login_Controller.js"></script>
  <script src="js/bloqueo.js"></script>
  
</body>
</html>
